<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Blue App</title>
    <style>
        :root {
            --dark-blue: #1a3a5f;
            --mid-blue: #4a90e2;
            --light-blue: #a2d2ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f7ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Keeps the "blobs" contained */
            position: relative;
        }

        /* Random Aesthetic Elements (Blobs) */
        .blob {
            position: absolute;
            z-index: -1;
            filter: blur(40px);
            opacity: 0.6;
            background: linear-gradient(45deg, var(--mid-blue), var(--light-blue));
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            top: -50px;
            left: -50px;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        }

        .blob-2 {
            width: 250px;
            height: 250px;
            bottom: 50px;
            right: -20px;
            border-radius: 60% 40% 30% 70% / 50% 30% 70% 50%;
            background: linear-gradient(135deg, var(--dark-blue), var(--mid-blue));
        }

        header {
            margin-top: 100px;
            color: var(--dark-blue);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            background: var(--mid-blue);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
            background: #357abd;
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <header>
        <h1>Feeling Blue?</h1>
    </header>

    <button onclick="showAlert()">Check in</button>

    <script>
        function showAlert() {
            alert("Hello, you good?");
        }
    </script>

</body>
</html>
